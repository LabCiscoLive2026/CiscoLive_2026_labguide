learning_objectives:
  - "Generate network traffic by accessing lab devices (routers, switches, and VMs) over SSH, HTTPS, and HTTP — simulating real-world data center activity."
  - "Capture and verify NetFlow telemetry using Cisco Secure Network Analytics (SNA) to confirm that device access activity is being recorded."
  - "Investigate network flows using SNA Flow Search to filter by protocol, host group, and source IP."
  - "Query SNA telemetry in Splunk Cloud to identify top utilized hosts and analyze who accessed what, over which protocol, and for how long."

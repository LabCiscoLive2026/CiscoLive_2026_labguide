# ============================================================================
#  MkDocs Technical Configuration
# ============================================================================
#  DO NOT edit this file for lab content changes.
#  Edit  data/lab_config.yaml  instead — it controls lab identity,
#  navigation, credentials, and all content variables.
# ============================================================================

# site_name, site_author, copyright, and nav are set automatically
# by hooks/config.py from data/lab_config.yaml.
site_name: ""

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.indexes
    - navigation.instant
    - navigation.top
    - navigation.footer
    - search.suggest
    - content.code.copy
    - toc.integrate
  custom_dir: docs/overrides
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  logo: template_assets/cisco_logo.png
  favicon: template_assets/cisco_logo.png

extra:
  generator: false
  footer_revision_datetime: true

extra_css:
  - stylesheets/extra.css

plugins:
  - search
  - macros:
      include_yaml:
        - data/lab_config.yaml
      on_error_fail: !ENV [MACRO_ERROR_FAIL, true]
      on_undefined: lax
      verbose: false
  # - to-pdf:
  #     cover_subtitle: "Walk-In Labs"
  #     cover_logo: template_assets/PDF_Event_General_Logo.png
  #     ordered_chapter_level: 1
  #     copyright: Copyright &copy; Cisco
  #     enabled: !ENV [ENABLE_PDF_EXPORT, true]
  - glightbox:
      touchNavigation: true
      loop: false
      effect: fade
      slide_effect: slide
      width: 100%
      height: auto
      zoomable: true
      draggable: false
      skip_classes:
        - custom-skip-class-name
      auto_caption: true
      caption_position: top

markdown_extensions:
  - md_in_html
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - meta
  - tables
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

hooks:
  - hooks/config.py

dev_addr: "0.0.0.0:8002"

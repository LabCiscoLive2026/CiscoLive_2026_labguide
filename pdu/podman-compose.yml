x-proxy-args: &proxy-args
  HTTP_PROXY: http://proxy.esl.cisco.com:80
  HTTPS_PROXY: http://proxy.esl.cisco.com:80

services:
  backend:
    build:
      context: ./backend
      args:
        <<: *proxy-args
    ports:
      - "8001:8001"
    env_file:
      - ./backend/.env
    volumes:
      - backend-cache:/app/exports
    restart: unless-stopped

  dashboard:
    build:
      context: ./pdu-dashboard-demo
      args:
        <<: *proxy-args
    ports:
      - "5222:8080"
    restart: unless-stopped

  labguide:
    build:
      context: ./DataCenter-power-mgmt-labguide-CL2026
      dockerfile: Containerfile
      args:
        <<: *proxy-args
    ports:
      - "8080:8002"
    restart: unless-stopped

volumes:
  backend-cache:

server {
    listen       8002;
    server_name  localhost;
    root         /usr/share/nginx/html;
    index        index.html;

    # Proxy API calls and static reservation UI to the FastAPI backend.
    # host.containers.internal resolves to the host machine from inside a podman container.
    location /api/ {
        proxy_pass         http://host.containers.internal:3888/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location /static/ {
        proxy_pass         http://host.containers.internal:3888/static/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_read_timeout 30s;
    }

    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;
}
